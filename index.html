<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Resume Screener</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2.2rem;
            color: #1a1a2e;
        }

        header h1 span {
            color: #4f46e5;
        }

        header p {
            color: #666;
            margin-top: 8px;
            font-size: 1rem;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 36px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            margin-bottom: 24px;
        }

        .card h2 {
            font-size: 1.2rem;
            color: #1a1a2e;
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 2px solid #f0f2f5;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 16px;
        }

        label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #444;
            margin-bottom: 6px;
        }

        input, textarea {
            padding: 12px 16px;
            border: 2px solid #e8e8e8;
            border-radius: 10px;
            font-size: 0.95rem;
            transition: border 0.2s;
            outline: none;
            font-family: inherit;
        }

        input:focus, textarea:focus {
            border-color: #4f46e5;
        }

        textarea {
            resize: vertical;
            min-height: 140px;
        }

        .upload-area {
            border: 2px dashed #c7c7c7;
            border-radius: 10px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .upload-area:hover {
            border-color: #4f46e5;
            background: #f8f7ff;
        }

        .upload-area input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
            border: none;
            padding: 0;
        }

        .upload-area .upload-icon {
            font-size: 2rem;
            margin-bottom: 8px;
        }

        .upload-area p {
            color: #666;
            font-size: 0.9rem;
        }

        .upload-area p span {
            color: #4f46e5;
            font-weight: 600;
        }

        .file-name {
            margin-top: 10px;
            font-size: 0.85rem;
            color: #4f46e5;
            font-weight: 500;
        }

        button[type="submit"] {
            width: 100%;
            padding: 14px;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 8px;
        }

        button[type="submit"]:hover {
            background: #4338ca;
        }

        button[type="submit"]:disabled {
            background: #a5a5a5;
            cursor: not-allowed;
        }

        .loader {
            display: none;
            text-align: center;
            padding: 20px;
            color: #666;
            font-size: 0.95rem;
        }

        .loader .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e8e8e8;
            border-top-color: #4f46e5;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .results {
            display: none;
        }

        .score-banner {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            border-radius: 12px;
            padding: 28px;
            text-align: center;
            color: white;
            margin-bottom: 20px;
        }

        .score-banner h3 {
            font-size: 0.95rem;
            opacity: 0.85;
            margin-bottom: 8px;
        }

        .score-banner .score {
            font-size: 3.5rem;
            font-weight: 700;
        }

        .score-banner .score span {
            font-size: 1.2rem;
            opacity: 0.75;
        }

        .result-section {
            margin-bottom: 20px;
        }

        .result-section h3 {
            font-size: 1rem;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tag {
            background: #fef3f2;
            color: #c0392b;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .suggestions-text {
            background: #f8f7ff;
            border-left: 4px solid #4f46e5;
            padding: 16px;
            border-radius: 0 10px 10px 0;
            color: #444;
            font-size: 0.92rem;
            line-height: 1.7;
        }

        .new-search-btn {
            width: 100%;
            padding: 12px;
            background: white;
            color: #4f46e5;
            border: 2px solid #4f46e5;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }

        .new-search-btn:hover {
            background: #f8f7ff;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>AI <span>Resume Screener</span></h1>
            <p>Upload a resume and job description to get an instant AI-powered analysis</p>
        </header>

        <!-- Form -->
        <div class="card" id="formCard">
            <h2>📋 Enter Details</h2>
            <div class="form-row">
                <div class="form-group">
                    <label>Candidate Name</label>
                    <input type="text" id="candidateName" placeholder="e.g. Uzair Shaikh" />
                </div>
                <div class="form-group">
                    <label>Job Title</label>
                    <input type="text" id="jobTitle" placeholder="e.g. Python Developer" />
                </div>
            </div>

            <div class="form-group">
                <label>Job Description</label>
                <textarea id="jobDescription" placeholder="Paste the job description here..."></textarea>
            </div>

            <div class="form-group">
                <label>Resume (PDF only)</label>
                <div class="upload-area" id="uploadArea">
                    <input type="file" id="resumeFile" accept=".pdf" onchange="updateFileName()" />
                    <div class="upload-icon">📄</div>
                    <p><span>Click to upload</span> or drag and drop</p>
                    <p>PDF files only</p>
                    <div class="file-name" id="fileName"></div>
                </div>
            </div>

            <button type="submit" id="submitBtn" onclick="submitForm()">
                🔍 Analyze Resume
            </button>
        </div>

        <!-- Loader -->
        <div class="loader" id="loader">
            <div class="spinner"></div>
            <p>Analyzing resume with AI... This may take a few seconds</p>
        </div>

        <!-- Results -->
        <div class="results card" id="results">
            <h2>📊 Analysis Results</h2>

            <div class="score-banner">
                <h3>Match Score</h3>
                <div class="score" id="matchScore">--<span>/100</span></div>
            </div>

            <div class="result-section">
                <h3>❌ Missing Skills</h3>
                <div class="tags" id="missingSkills"></div>
            </div>

            <div class="result-section">
                <h3>💡 Suggestions</h3>
                <div class="suggestions-text" id="suggestions"></div>
            </div>

            <button class="new-search-btn" onclick="resetForm()">🔄 Screen Another Resume</button>
        </div>
    </div>

    <script>
        function updateFileName() {
            const file = document.getElementById('resumeFile').files[0];
            document.getElementById('fileName').textContent = file ? file.name : '';
        }

        async function submitForm() {
            const candidateName = document.getElementById('candidateName').value.trim();
            const jobTitle = document.getElementById('jobTitle').value.trim();
            const jobDescription = document.getElementById('jobDescription').value.trim();
            const resumeFile = document.getElementById('resumeFile').files[0];

            if (!candidateName || !jobTitle || !jobDescription || !resumeFile) {
                alert('Please fill in all fields and upload a resume.');
                return;
            }

            const formData = new FormData();
            formData.append('candidate_name', candidateName);
            formData.append('job_title', jobTitle);
            formData.append('job_description', jobDescription);
            formData.append('resume', resumeFile);

            document.getElementById('formCard').style.display = 'none';
            document.getElementById('loader').style.display = 'block';
            document.getElementById('submitBtn').disabled = true;

            try {
                const response = await fetch('https://resume-screener.onrender.com/screen', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                document.getElementById('loader').style.display = 'none';
                document.getElementById('results').style.display = 'block';

                const scoreText = data.match_score.replace('/100', '').trim();
                document.getElementById('matchScore').innerHTML = `${scoreText}<span>/100</span>`;

                const skills = data.missing_skills.split(',');
                document.getElementById('missingSkills').innerHTML = skills
                    .map(skill => `<span class="tag">${skill.trim()}</span>`)
                    .join('');

                document.getElementById('suggestions').textContent = data.suggestions;

            } catch (error) {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('formCard').style.display = 'block';
                alert('Something went wrong. Make sure the server is running.');
                document.getElementById('submitBtn').disabled = false;
            }
        }

        function resetForm() {
            document.getElementById('results').style.display = 'none';
            document.getElementById('formCard').style.display = 'block';
            document.getElementById('submitBtn').disabled = false;
            document.getElementById('candidateName').value = '';
            document.getElementById('jobTitle').value = '';
            document.getElementById('jobDescription').value = '';
            document.getElementById('resumeFile').value = '';
            document.getElementById('fileName').textContent = '';
        }
    </script>
</body>
</html>
